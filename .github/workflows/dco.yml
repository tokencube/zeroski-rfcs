name: DCO

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  dco-check:
    name: Signed-off-by check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by on every commit
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          echo "Checking commits from $base..$head"

          missing=0
          while IFS= read -r sha; do
            subject=$(git log -1 --pretty=%s "$sha")
            if git log -1 --pretty=%B "$sha" | grep -qE '^Signed-off-by: .+ <.+@.+>$'; then
              echo "OK    $sha  $subject"
            else
              echo "FAIL  $sha  $subject  (missing Signed-off-by trailer)"
              missing=$((missing + 1))
            fi
          done < <(git rev-list "$base..$head")

          if [ "$missing" -gt 0 ]; then
            echo ""
            echo "$missing commit(s) are missing a Signed-off-by trailer."
            echo "Amend them with: git commit --amend --signoff (or rebase with -S / --signoff)"
            echo "See https://developercertificate.org/ for what you are certifying."
            exit 1
          fi
