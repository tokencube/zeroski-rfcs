name: secret-scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly sweep — catch secrets rewritten into history via force-push.
    - cron: "17 3 * * 6"

permissions:
  contents: read
  pull-requests: read

jobs:
  trufflehog:
    name: trufflehog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog (verified secrets only)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          VER=8.18.4
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xzf - -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks on working tree + full history
        run: |
          gitleaks detect --source . --no-banner --redact --verbose
