name: secret-scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly sweep — catch any secret that snuck past the PR gate (or
    # was rewritten into an older commit via force-push). Saturday 03:17 UTC.
    - cron: "17 3 * * 6"

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
